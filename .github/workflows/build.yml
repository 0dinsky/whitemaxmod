name: Simple rebuild with latest Apktool

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Install latest Apktool
        run: |
          # Скачиваем последнюю версию напрямую
          LATEST_URL=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | grep "browser_download_url.*jar" | cut -d '"' -f 4)
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          wget -q "$LATEST_URL" -O apktool.jar
          chmod +x apktool
          sudo mv apktool /usr/local/bin/
          sudo mv apktool.jar /usr/local/bin/
          echo "✅ Installed: $(apktool --version)"
      
      - name: Build APK
        run: |
          mkdir -p dist
          apktool b . -o dist/unsigned.apk
          
          # Простая подпись
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug" -noprompt
          
          # Используем последние build-tools
          BUILD_TOOLS=$(ls -1v $ANDROID_HOME/build-tools | tail -n 1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign -v -p 4 dist/unsigned.apk dist/aligned.apk
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign --ks debug.keystore --ks-key-alias debug --ks-pass pass:android --key-pass pass:android dist/aligned.apk
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rebuilt-app
          path: dist/aligned.apk
